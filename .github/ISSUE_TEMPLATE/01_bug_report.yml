name: Bug report
description: Report a reproducible Swarf bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Provide the smallest reliable reproduction steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Swarf Version Or Commit
  - type: input
    id: os
    attributes:
      label: Operating System
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      description: Do not include secrets, tokens, private keys, or private data.
