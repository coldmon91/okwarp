name: Feature request
description: Suggest an Swarf improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user-facing problem before proposing an implementation.
    validations:
      required: true
  - type: textarea
    id: desired
    attributes:
      label: Desired Behavior
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Note compatibility, security, privacy, licensing, or migration constraints.
