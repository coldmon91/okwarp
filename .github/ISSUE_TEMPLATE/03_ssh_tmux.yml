name: SSH tmux issue
description: Report an Swarf SSH or tmux integration issue.
title: "[SSH/tmux]: "
labels: ["ssh", "tmux"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Swarf Version Or Commit
  - type: input
    id: os
    attributes:
      label: Operating System
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Do not include secrets, tokens, private keys, or private data.
