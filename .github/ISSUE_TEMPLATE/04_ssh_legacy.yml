name: SSH legacy issue
description: Report a legacy SSH integration issue.
title: "[SSH legacy]: "
labels: ["ssh"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include local OS, remote OS, shell, SSH config details, and Swarf version.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Do not include secrets, tokens, private keys, or private data.
